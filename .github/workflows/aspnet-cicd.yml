name: ASP.NET CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '6.0.x'
  BUILD_CONFIG: Release
  ARTIFACT_NAME: aspnet-app
  IMAGE_NAME: abiskarag/hamroshoppingapp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIG }}

      - name: Publish
        run: dotnet publish --no-build --configuration ${{ env.BUILD_CONFIG }} --output ./publish


# if Docker is not used then uncomemnt this code
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ env.ARTIFACT_NAME }}
      #     path: ./publish

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration ${{ env.BUILD_CONFIG }} --verbosity normal

# Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#  Build Docker Image
      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

# Push Docker Image
      - name: Push Docker Image
        run: docker push $IMAGE_NAME:${{ github.sha }}

  deploy:
   runs-on: ubuntu-latest
   needs: test
   if: github.ref == 'refs/heads/master'
   environment: production

   steps:
    # If docker not used then uncomment this code
    # - name: Download artifact
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: ${{ env.ARTIFACT_NAME }}
    #     path: ./publish

    # - name: Deploy to Azure App Service
    #   uses: azure/webapps-deploy@v3
    #   with:
    #     app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
    #     publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
    #     package: ./publish

    - name: Deploy to Azure Web App (Docker)
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        images: ${{ env.IMAGE_NAME }}:${{ github.sha }}